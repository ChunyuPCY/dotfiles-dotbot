- plugins:
    - dotbot-age

- decrypt: true

- defaults:
    link:
      create: true
      force: true
      relink: true

- clean: ["~"]

- link:
    ~/.config/starship: ./starship
    ~/.config/nvim-minimax: ./nvim-minimax
    ~/.config/eza: ./eza
    ~/.config/bat: ./bat
    ~/.config/bottom: ./bottom
    ~/.config/wezterm: ./wezterm
    ~/.config/zellij: ./zellij
    ~/.config/fastfetch: ./fastfetch
    ~/.config/yazi: ./yazi

    # fish
    ~/.config/fish: ./fish
    ~/.config/fish/private/api-key.fish: private/fish/api-key.fish

- shell:
    - git submodule sync --recursive
    - git submodule update --init --recursive --remote
