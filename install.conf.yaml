- plugins:
    - dotbot-age

- decrypt: true

- defaults:
    link:
      create: true
      force: true
      relink: true

- clean: ["~"]

- link:
    ~/.config/starship: ./starship
    ~/.config/nvim-minimax: ./nvim-minimax

    # fish
    ~/.config/fish: ./fish
    ~/.config/fish/config.fish.private: private/fish/config.fish.private

- shell:
    - git submodule sync --recursive
    - git submodule update --init --recursive --remote
