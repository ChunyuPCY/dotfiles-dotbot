# ╭──────────────────────────────────────────────────────────╮
# │                         Plugins                          │
# ╰──────────────────────────────────────────────────────────╯

set-environment -g TMUX_PLUGIN_MANAGER_PATH "${XDG_DATA_HOME}/tmux/plugins"
if "test ! -d ${XDG_DATA_HOME}/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ${XDG_DATA_HOME}/tmux/plugins/tpm && ${XDG_DATA_HOME}/tmux/plugins/tpm/bin/install_plugins'"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'

# List of tmux plugins
set -g @plugin 'mrjones2014/smart-splits.nvim'
set -g @plugin 'tmux-plugins/tmux-resurrect'    # Persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum'    # Automatically saves sessions every 15 minutes
set -g @plugin 'hendrikmi/tmux-cpu-mem-monitor' # CPU and memory info

# ╭──────────────────────────────────────────────────────────╮
# │                       Navigation                         │
# ╰──────────────────────────────────────────────────────────╯

# Optional configurations with their default values if omitted:

set -g @smart-splits_no_wrap '' # to disable wrapping. (any value disables wrapping)

set -g @smart-splits_move_left_key  'C-h' # key-mapping for navigation.
set -g @smart-splits_move_down_key  'C-j' #  --"--
set -g @smart-splits_move_up_key    'C-k' #  --"--
set -g @smart-splits_move_right_key 'C-l' #  --"--

set -g @smart-splits_resize_left_key  'C-Left'  # key-mapping for resizing.
set -g @smart-splits_resize_down_key  'C-Down'  #  --"--
set -g @smart-splits_resize_up_key    'C-Up'    #  --"--
set -g @smart-splits_resize_right_key 'C-Right' #  --"--

set -g @smart-splits_resize_step_size '3' # change the step-size for resizing.


# ╭──────────────────────────────────────────────────────────╮
# │                         Themes                           │
# ╰──────────────────────────────────────────────────────────╯
# Style
c_flamingo="#D8DEE9"
c_text="#cdd6f4"
c_mauve="#cba6f7"
c_sapphire="#74c7ec"
c_peach="#fab387"

set -g status-position top
set -g status-left-length 100
set -g status-style "fg=${c_flamingo},bg=default"
set -g status-left "#[fg=${c_mauve},bold] #S #[fg=${c_flamingo},nobold] | "
set -g status-right " #{cpu}   #{mem}  󱛟 #{disk -f}  󱊣 #{battery}"
# set -g status-right " #{cpu}   #{mem} "
set -g window-status-current-format "#[fg=${c_peach},bold]  #[underscore]#I:#W#[nounderscore]#{?window_zoomed_flag, 󰍋 ,}"
set -g window-status-format " #I:#W"
set -g message-style "fg=${c_flamingo},bg=default"
set -g mode-style "fg=${c_text},bg=${c_sapphire}"
set -g pane-border-style "fg=${c_text}"
set -g pane-active-border-style "fg=${c_mauve}"

# Resurrect
set -g @resurrect-capture-pane-contents 'on'
# set -g @continuum-restore 'on'
# default shell
set -g default-shell "$SHELL"

# Enable 256-color and true-color (24-bit) support in tmux
set -g default-terminal "screen-256color" # Set terminal type for 256-color support
set -ga terminal-overrides ",*256col*:Tc" # Override to enable true-color for compatible terminals

# General
set -g set-clipboard on         # Use system clipboard
set -g mouse on                 # Enable mouse support
set -g status-interval 5        # Update the status bar every 5 seconds (default: 15)
set -g detach-on-destroy off    # Don't exit from tmux when closing a session
set -g escape-time 0            # Remove delay for exiting insert mode with ESC in Neovim

# Set prefix key
unbind C-b            # Unbind the default prefix key
set -g prefix C-Space # Set new prefix key to Ctrl+Space
# set -g prefix C-a   # Set new prefix key to Ctrl+a

# Refresh tmux config with r
unbind r
bind r source-file "${XDG_CONFIG_HOME}/tmux/tmux.conf" \; display "Configuration reloaded!"

# Split horizontally in CWD with |
unbind %
bind | split-window -h -c "#{pane_current_path}"

# Split vertically in CWD with -
unbind \"
bind - split-window -v -c "#{pane_current_path}"

# New window in same path
bind c new-window -c "#{pane_current_path}"

# Use m key to maximize pane
unbind z                                  # Unbind default maximize key
bind -r m resize-pane -Z

# Enable vi mode to allow us to use vim keys to move around in copy mode
# NOTE: (Prefix + [ places us in copy mode)
set-window-option -g mode-keys vi

# Start selecting text with "v"
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Copy text with "y"
bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"

# Paste yanked text with "Prefix + P" ("Prefix + p" goes to previous window)
bind P paste-buffer

# Don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Swap windows
bind -r S-Left run 'tmux swap-window -d -t #{e|-|:#I,1}'
bind -r S-Right run 'tmux swap-window -d -t #{e|+|:#I,1}'

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on # Automatically renumber windows when one is closed


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run "${XDG_DATA_HOME}/tmux/plugins/tpm/tpm"
